services:
  - type: web
    name: fluxo
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && node --experimental-sqlite node_modules/.bin/next build
    startCommand: node --experimental-sqlite node_modules/.bin/next start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: THE_NEWS_API_KEY
        sync: false
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: fluxo-data
      mountPath: /var/data
      sizeGB: 1
